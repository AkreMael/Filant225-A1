  /* Base reset pour mobile */

  html, body {

  /* --- ANIMATIONS --- */
  @keyframes flash-green-red {
    0%, 49% { background-color: #16a34a; box-shadow: 0 0 10px rgba(34, 197, 94, 0.8); }
    50%, 100% { background-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
  }
  .animate-flash-green-red {
    animation: flash-green-red 0.4s infinite;
  }

  @keyframes blink-limit {
    0%, 100% { background-color: #ef4444; color: white; transform: scale(1); }
    50% { background-color: white; color: #ef4444; transform: scale(1.05); }
  }
  .animate-blink-limit {
    animation: blink-limit 0.5s infinite;
  }

  @keyframes demande-signal {
    0%, 100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 5px rgba(34, 197, 94, 0.4); }
    50% { transform: scale(1.04); filter: brightness(1.3); box-shadow: 0 0 20px rgba(34, 197, 94, 0.8); }
    10%, 12%, 14% { transform: scale(1.04) translateX(-1px) rotate(-0.5deg); }
    11%, 13%, 15% { transform: scale(1.04) translateX(1px) rotate(0.5deg); }
  }
  .animate-demande-signal {
    animation: demande-signal 2s infinite ease-in-out;
  }

  @keyframes custom-green-pulse { 50% { filter: brightness(0.7); } }
  .animate-custom-green-pulse { animation: custom-green-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes worker-search-animation {
    0% { transform: translate(0, 0) rotate(10deg); }
    50% { transform: translate(-15px, 5px) rotate(-20deg); }
    100% { transform: translate(0, 0) rotate(10deg); }
  }
  .animate-worker-search { animation: worker-search-animation 3.5s ease-in-out infinite; transform-origin: 80% 80%; }
  @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
  .animate-soft-blink { animation: soft-blink 2s ease-in-out infinite; }
  @keyframes flash-black { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(0.1); } }
  .animate-flash-black { animation: flash-black 1.5s ease-in-out infinite; }
  @keyframes flash-tricolor {
    0% { background-color: #f97316; color: #ffffff; }
    33% { background-color: #ffffff; color: #000000; }
    66% { background-color: #16a34a; color: #ffffff; }
    100% { background-color: #f97316; color: #ffffff; }
  }
  .animate-flash-tricolor { animation: flash-tricolor 3s linear infinite; }
  @keyframes flash-red-blue { 0%, 100% { background-color: #312e81; } 50% { background-color: #ef4444; } }
  .animate-flash-red-blue { animation: flash-red-blue 1.5s ease-in-out infinite; }
  @keyframes flash-red-white { 0%, 100% { color: #ef4444; } 50% { color: #ffffff; } }
  .animate-flash-red-white { animation: flash-red-white 1.5s ease-in-out infinite; }
  @keyframes flash-nav { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .animate-flash-nav { animation: flash-nav 1.5s ease-in-out infinite; }
  @keyframes scan-line { 0% { top: 0%; } 100% { top: 100%; } }
  .animate-scan-line { animation: scan-line 2s linear infinite; }
  @keyframes flash-green-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .animate-flash-green-text { animation: flash-green-text 1.5s ease-in-out infinite; }
  @keyframes roll-in { 0% { opacity: 0; transform: scale(0.3) rotate(-15deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
  .animate-roll-in { animation: roll-in 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
  @keyframes unfold-in { 0% { opacity: 0; transform: perspective(1000px) rotateX(-90deg); transform-origin: top center; } 100% { opacity: 1; transform: perspective(1000px) rotateX(0deg); transform-origin: top center; } }
  .animate-unfold-in { animation: unfold-in 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

  @keyframes initial-progress {
    0% { width: 0%; }
    100% { width: 60%; }

    animation: initial-progress 3s ease-out forwards;
  }

  @keyframes blink-gray {

  @keyframes rapid-blink-green {

    50% { background-color: #4ade80; transform: scale(1.1); }

  }

  /* --- EFFET VAPEUR / RIPPLE PLEIN ÉCRAN --- */
  .vapeur-ripple {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(249, 115, 22, 0.3) 30%, transparent 70%);
    transform: scale(0);
    pointer-events: none;
    z-index: 10000;
    filter: blur(40px);
    mix-blend-mode: screen;
    animation: expansion-vapeur 1.2s cubic-bezier(0.1, 0, 0.1, 1) forwards;
  }

  @keyframes expansion-vapeur {
    0% {
      transform: scale(0);
      opacity: 1;
    }
    100% {
      transform: scale(120);
      opacity: 0;
    }
  }

  /* Responsive admin layout */
